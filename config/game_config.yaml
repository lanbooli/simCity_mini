# 城市小镇 - 游戏配置
# 场景、天气、时间等基础设定

game:
  name: "城市小镇"
  start_day: 1
  start_hour: 8
  start_minute: 0
  game_speed_multiplier: 120  # 1真秒=120游戏秒=2游戏分钟

# 天气系统
weather:
  initial: "sunny"
  transition_weights:
    sunny_to_cloudy: 0.15
    cloudy_to_rainy: 0.20
    cloudy_to_sunny: 0.25
    rainy_to_stormy: 0.10
    rainy_to_cloudy: 0.30
    stormy_to_rainy: 0.40
    snowy_to_cloudy: 0.25
    cloudy_to_snowy: 0.05

# ── 亲密舒适度参数 ──
intimacy_comfort:
  growth_per_hour_same_scene: 1
  growth_personality_extrovert: 1.5
  decay_per_day_absent: 2
  decay_witness_intimacy: 5

# ── 恋爱系统参数 ──
romance:
  love_eligible:
    favorability_min: 80
    intimacy_comfort_min: 70
    familiarity_min: 35
  confession_acceptance:
    base_rate: 0.60
    fav_85_plus: 0.40
    comfort_80_plus: 0.30
    personality_romantic: 0.20
    personality_shy: -0.15
  npc_confession_probability:
    base_per_tick: 0.05
    personality_romantic: 4.0
    personality_extrovert: 2.5
    personality_shy: 0.2
  proposal:
    favorability_min: 90
    intimacy_comfort_min: 90
    familiarity_min: 60
    min_ticks_as_lovers: 1440

# ── 越界行为参数 ──
boundary_violation:
  violation_threshold: 3
  relation_levels:
    stranger: 0
    acquaintance: 1
    friend: 2
    best_friend: 3
    boyfriend: 4
    girlfriend: 4
    spouse: 5
    parent: 5
    sibling: 5
    child: 5
    dislike: -1
    enemy: -2
  favorability_penalty:
    minor: -20
    moderate: -50
    severe: -80
    violent: -100
  comfort_penalty:
    minor: -10
    moderate: -50
    severe: -100
    violent: -100
  gossip:
    witness_count_1: 0.8
    witness_count_3plus: 1.0
    spread_tick_single: 24
    spread_tick_multiple: 12
    reputation_drop:
      minor: 5
      moderate: 15
      severe: 30
      violent: 40
  recovery_ticks:
    minor: 240
    moderate: 720
    severe: 2880
    violent: -1
  counter_attack:
    enabled: true
    attribute_diff_for_npc_win: 2

# ── 朋友圈参数 ──
social_feed:
  post_probability_base: 0.03
  post_cooldown_ticks: 480
  personality_extrovert_mult: 2.5
  personality_talkative_mult: 3.0
  personality_shy_mult: 0.3
  npc_browse_interval_ticks: 30
  npc_like_acquaintance_prob: 0.6
  npc_comment_acquaintance_prob: 0.2
  player_like_daily_cap: 3
  post_retention_game_days: 7

# 场景定义
scenes:
  - id: "scene_coffee_shop"
    name: "阳光咖啡店"
    description: "一家温馨的街角咖啡店，飘着咖啡豆的香气，阳光透过落地窗洒在木质地板上。"
    scene_type: "cafe"
    weather_affected: false
    max_capacity: 15
    icon: "☕"

  - id: "scene_park"
    name: "中心公园"
    description: "小镇中心的公园，绿树成荫，有一个小湖和几条长椅，是居民休闲的好去处。"
    scene_type: "outdoor"
    weather_affected: true
    max_capacity: 50
    icon: "🌳"

  - id: "scene_school"
    name: "小镇高中"
    description: "镇上唯一的高中，有教学楼、操场和图书馆。年轻的学生们在这里度过他们的校园时光。"
    scene_type: "school"
    weather_affected: false
    max_capacity: 100
    icon: "🏫"

  - id: "scene_library"
    name: "公共图书馆"
    description: "安静祥和的图书馆，书架间弥漫着旧书的味道，是学习和阅读的理想场所。"
    scene_type: "library"
    weather_affected: false
    max_capacity: 30
    icon: "📚"

  - id: "scene_market"
    name: "便民超市"
    description: "街角的便民超市，货架上摆满了日常用品和新鲜食材，老板娘总是热情地招呼顾客。"
    scene_type: "market"
    weather_affected: false
    max_capacity: 20
    icon: "🏪"


  - id: "scene_restaurant"
    name: "小镇餐厅"
    description: "一家温暖的家庭餐厅，木质的桌椅和暖黄的灯光，供应可口的家常菜。"
    scene_type: "restaurant"
    weather_affected: false
    max_capacity: 30
    icon: "🍽️"

  - id: "scene_bar"
    name: "夜色酒吧"
    description: "小镇夜晚的热闹去处，昏暗的灯光下人们喝酒聊天，偶尔有驻唱歌手。"
    scene_type: "bar"
    weather_affected: false
    max_capacity: 25
    icon: "🍺"

  - id: "scene_gym"
    name: "健身中心"
    description: "明亮的健身房，各种器械一应俱全，墙上贴着激励标语。"
    scene_type: "gym"
    weather_affected: false
    max_capacity: 20
    icon: "💪"

  - id: "scene_cinema"
    name: "小镇影院"
    description: "小镇唯一的电影院，不大但很温馨，门口总是贴着最新电影的海报。"
    scene_type: "cinema"
    weather_affected: false
    max_capacity: 40
    icon: "🎬"

  - id: "scene_clothing"
    name: "服装店"
    description: "一家精致的服装店，橱窗里展示着当季新款，老板娘品味不错。"
    scene_type: "shop"
    weather_affected: false
    max_capacity: 15
    icon: "👗"

  - id: "scene_station"
    name: "小镇车站"
    description: "小镇的公交车站，遮阳棚下有几张长椅，是居民日常通勤的必经之地。"
    scene_type: "outdoor"
    weather_affected: true
    max_capacity: 30
    icon: "🚉"

  - id: "scene_riverside"
    name: "河边步道"
    description: "沿着小河蜿蜒的步道，柳树依依，河里偶尔能看到鸭子游过。"
    scene_type: "outdoor"
    weather_affected: true
    max_capacity: 25
    icon: "🌊"

  - id: "scene_office"
    name: "镇政府"
    description: "一栋两层的政府办公楼，办理各种事务，工作人员忙碌而有序。"
    scene_type: "office"
    weather_affected: false
    max_capacity: 30
    icon: "🏛️"

  - id: "scene_arcade"
    name: "游戏厅"
    description: "充满霓虹灯和街机音效的游戏厅，投篮机和抓娃娃机前总有人在排队。"
    scene_type: "arcade"
    weather_affected: false
    max_capacity: 20
    icon: "🎮"

  - id: "scene_hospital"
    name: "小镇医院"
    description: "小镇的综合医院，虽然不大但设备齐全。"
    scene_type: "hospital"
    weather_affected: false
    max_capacity: 50
    icon: "🏥"
